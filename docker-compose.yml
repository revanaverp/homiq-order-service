services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homiq-order-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - homiq-network

  nginx:
    image: nginx:alpine
    container_name: homiq-order-nginx
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - homiq-network

  postgres:
    image: postgres:15
    container_name: homiq-order-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: homiq_order
      POSTGRES_USER: homiq
      POSTGRES_PASSWORD: secret
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - homiq-network

  redis:
    image: redis:alpine
    container_name: homiq-order-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    networks:
      - homiq-network

  listener-payment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homiq-order-listener-payment
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    command: php artisan listen:payment
    networks:
      - homiq-network
    depends_on:
      - app
      - redis

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homiq-order-queue-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    command: php artisan queue:work --tries=3
    networks:
      - homiq-network
    depends_on:
      - app
      - redis

networks:
  homiq-network:
    driver: bridge

volumes:
  pgdata:
